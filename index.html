<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Universe Architect Ultra</title>
<style>
body{margin:0;overflow:hidden;background:#020617;color:white;font-family:Arial}
canvas{position:fixed;inset:0}
#ui{position:fixed;left:10px;top:10px;width:320px;max-width:90vw;
background:rgba(0,0,0,.45);padding:12px;border-radius:14px;backdrop-filter:blur(8px)}
button{padding:8px;margin:4px;border:none;border-radius:8px;cursor:pointer}
.panel{margin-top:8px;font-size:14px}
#log{height:120px;overflow:auto;font-size:12px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
<h2>🌌 Universe Architect Ultra</h2>
<div>⚡ Energy: <span id="energy">0</span></div>
<div>⭐ Stars: <span id="stars">0</span></div>
<div>🌌 Galaxies: <span id="galaxies">0</span></div>
<div>🚀 Civilizations: <span id="civs">0</span></div>
<div>🏆 Achievements: <span id="ach">0</span></div>
<div>⏳ Age: <span id="age">0</span></div>

<div class="panel">
<button onclick="buyStar()">Create Star</button>
<button onclick="buyGalaxy()">Create Galaxy</button>
<button onclick="buyCiv()">Civilization</button>
</div>

<div class="panel">
<button onclick="upgrade(1)">Energy Core</button>
<button onclick="upgrade(2)">Galaxy Forge</button>
<button onclick="upgrade(3)">AI Empire</button>
</div>

<h4>Event Log</h4>
<div id="log"></div>
</div>

<script>
const c=document.getElementById('game');
const ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight;}
rs();addEventListener('resize',rs);

let energy=0,stars=0,galaxies=0,civs=0,age=0,ach=0;
let mult=1;
const particles=[];
const starsBg=[];
const galaxiesFx=[];

for(let i=0;i<500;i++){
 starsBg.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+0.2,s:Math.random()*1.5});
}

function logMsg(t){
 document.getElementById('log').innerHTML="<div>"+t+"</div>"+document.getElementById('log').innerHTML;
}

function updateUI(){
 energyEl.textContent=Math.floor(energy);
 starsEl.textContent=stars;
 galaxiesEl.textContent=galaxies;
 civsEl.textContent=civs;
 achEl.textContent=ach;
 ageEl.textContent=Math.floor(age);
}

const energyEl=document.getElementById("energy");
const starsEl=document.getElementById("stars");
const galaxiesEl=document.getElementById("galaxies");
const civsEl=document.getElementById("civs");
const achEl=document.getElementById("ach");
const ageEl=document.getElementById("age");

c.onclick=(e)=>{
 energy+=1*mult;
 for(let i=0;i<12;i++){
   particles.push({x:e.clientX,y:e.clientY,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,l:40});
 }
};

function buyStar(){
 if(energy>=25){energy-=25;stars++;logMsg("⭐ Star created");}
}
function buyGalaxy(){
 if(stars>=10){stars-=10;galaxies++;logMsg("🌌 Galaxy formed");
 galaxiesFx.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:20});
}
}
function buyCiv(){
 if(galaxies>=2){galaxies-=2;civs++;logMsg("🚀 Civilization awakened");}
}

function upgrade(id){
 if(id===1 && energy>=100){energy-=100;mult+=1;logMsg("⚡ Energy Core upgraded");}
 if(id===2 && energy>=500){energy-=500;stars+=5;logMsg("🌌 Galaxy Forge unlocked");}
 if(id===3 && energy>=1000){energy-=1000;civs+=2;logMsg("🤖 AI Empire expanded");}
}

function achievement(txt){
 ach++;
 logMsg("🏆 "+txt);
}

setInterval(()=>{
 age+=1000;
 energy+=(stars*0.5+galaxies*5+civs*15)*mult;

 let r=Math.random();

 if(r<0.01 && stars>3){
   stars--;
   logMsg("🕳️ Black hole consumed a star");
 }

 if(r>0.98){
   energy+=150;
   logMsg("☄️ Supernova released energy");
 }

 if(r>0.995 && civs>0){
   energy+=500;
   logMsg("👽 Alien civilization contacted");
 }

 if(stars>=25 && ach<1) achievement("25 Stars Reached");
 if(galaxies>=10 && ach<2) achievement("Galaxy Architect");
 if(civs>=5 && ach<3) achievement("Space Emperor");

 localStorage.setItem("ua_ultra",JSON.stringify(
 {energy,stars,galaxies,civs,age,ach,mult}
 ));

 updateUI();
},1000);

let save=localStorage.getItem("ua_ultra");
if(save){
 let d=JSON.parse(save);
 energy=d.energy||0;
 stars=d.stars||0;
 galaxies=d.galaxies||0;
 civs=d.civs||0;
 age=d.age||0;
 ach=d.ach||0;
 mult=d.mult||1;
}

function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 for(let s of starsBg){
   ctx.beginPath();
   ctx.fillStyle="white";
   ctx.arc(s.x,s.y,s.r,0,6.28);
   ctx.fill();
   s.y+=s.s;
   if(s.y>c.height)s.y=0;
 }

 for(let g of galaxiesFx){
   g.r+=0.03;
   let grd=ctx.createRadialGradient(g.x,g.y,1,g.x,g.y,g.r);
   grd.addColorStop(0,"rgba(120,120,255,.6)");
   grd.addColorStop(1,"rgba(0,0,0,0)");
   ctx.fillStyle=grd;
   ctx.beginPath();
   ctx.arc(g.x,g.y,g.r,0,6.28);
   ctx.fill();
 }

 for(let p of particles){
   p.x+=p.vx;p.y+=p.vy;p.l--;
   ctx.fillStyle="cyan";
   ctx.fillRect(p.x,p.y,2,2);
 }
 for(let i=particles.length-1;i>=0;i--){
   if(particles[i].l<=0) particles.splice(i,1);
 }

 requestAnimationFrame(draw);
}
updateUI();
draw();
</script>
</body>
</html>
